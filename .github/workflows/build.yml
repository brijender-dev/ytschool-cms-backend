name: Build YTSchool.Cms

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  DOTNET_VERSION: '9.x'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: YTSchool.Cms

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore YTSchool.Cms.sln

      - name: Build
        run: dotnet build YTSchool.Cms.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test YTSchool.Cms.sln --configuration Release --no-restore --no-build

      - name: Publish
        run: dotnet publish YTSchool.Cms.sln --configuration Release --no-restore --no-build
